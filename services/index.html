<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Agape — Service Checklists</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #f0ede6; --cream2: #e8e4db; --cream3: #ddd9cf;
  --ink: #1a1714; --ink2: #3d3830; --ink3: #7a7268; --ink4: #b0a89e;
  --border: rgba(26,23,20,0.09); --border2: rgba(26,23,20,0.18);
  --green: #2d6a4f; --green-bg: #d4edda; --green-b: rgba(45,106,79,0.22);
  --amber: #388E3C; --amber-bg: #E8F5E9; --amber-b: rgba(76,175,80,0.3);
  --red: #842029; --red-bg: #fdf0f0; --red-b: rgba(132,32,41,0.2);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { min-height: 100vh; }
body { background: var(--cream); color: var(--ink); font-family: 'Jost', sans-serif; font-weight: 300; }

/* HEADER */
.header { background: var(--ink); padding: 22px 24px 0; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.header-logo { height: 34px; filter: invert(1) brightness(0.88); }
.header-right { text-align: right; }
.header-prop { font-size: 11px; color: rgba(240,237,230,0.5); letter-spacing: 0.06em; }
.header-date { font-size: 12px; color: rgba(240,237,230,0.75); }

/* SERVICE TABS */
.service-tabs { display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; padding-bottom: 0; }
.service-tabs::-webkit-scrollbar { display: none; }
.svc-tab { flex-shrink: 0; padding: 12px 18px 14px; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 80px; }
.svc-tab:hover { background: rgba(240,237,230,0.06); }
.svc-tab.active { border-bottom-color: #4CAF50; }
.svc-tab-icon { font-size: 18px; }
.svc-tab-label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(240,237,230,0.45); white-space: nowrap; }
.svc-tab.active .svc-tab-label { color: #4CAF50; }
.svc-tab-badge { font-size: 8px; background: rgba(45,106,79,0.8); color: #a8f0c8; padding: 1px 5px; border-radius: 8px; display: none; }
.svc-tab.done .svc-tab-badge { display: block; }

/* CONTENT */
.content { max-width: 680px; margin: 0 auto; padding: 24px 18px 100px; }

/* SERVICE PANEL */
.svc-panel { display: none; }
.svc-panel.active { display: block; animation: fadeUp 0.2s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)} }

/* WORKER INFO BAR */
.worker-bar { background: white; border: 1px solid var(--border2); padding: 14px 18px; display: flex; gap: 14px; align-items: center; margin-bottom: 14px; }
.worker-bar input { flex: 1; border: none; border-bottom: 1px solid var(--border2); padding: 4px 0; font-family: 'Jost', sans-serif; font-size: 14px; font-weight: 300; color: var(--ink); outline: none; background: transparent; transition: border 0.2s; }
.worker-bar input:focus { border-bottom-color: var(--ink); }
.worker-bar input::placeholder { color: var(--ink4); }
.worker-label { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink3); white-space: nowrap; }

/* SERVICE HEADER CARD */
.svc-header-card { background: var(--ink); padding: 20px 22px; margin-bottom: 14px; display: flex; align-items: center; gap: 16px; }
.svc-header-icon { font-size: 28px; }
.svc-header-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; color: rgba(240,237,230,0.95); }
.svc-header-sub { font-size: 11px; color: rgba(240,237,230,0.4); margin-top: 2px; letter-spacing: 0.06em; }
.svc-header-badge { margin-left: auto; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; padding: 5px 12px; border: 1px solid rgba(240,237,230,0.15); color: rgba(240,237,230,0.45); }

/* PROGRESS */
.prog-wrap { height: 2px; background: var(--cream3); margin-bottom: 3px; }
.prog-bar { height: 2px; background: var(--ink); transition: width 0.4s ease; }
.prog-label { font-size: 10px; color: var(--ink3); letter-spacing: 0.06em; margin-bottom: 16px; text-align: right; }

/* CHECKLIST SECTION */
.cl-section { background: white; border: 1px solid var(--border); margin-bottom: 2px; }
.cl-section-head { display: flex; align-items: center; gap: 10px; padding: 14px 18px; cursor: pointer; border-bottom: 1px solid transparent; transition: all 0.15s; }
.cl-section-head:hover { background: var(--cream); }
.cl-section-head.open { border-bottom-color: var(--border); }
.cl-section-icon { font-size: 15px; }
.cl-section-name { font-size: 14px; font-weight: 500; flex: 1; }
.cl-section-tally { font-size: 10px; color: var(--ink3); }
.cl-section-tally.done { color: var(--green); font-weight: 500; }
.chevron { font-size: 9px; color: var(--ink3); transition: transform 0.2s; }
.cl-section-head.open .chevron { transform: rotate(180deg); }
.cl-body { display: none; }
.cl-body.open { display: block; }

/* TASK ROWS */
.task-row { display: flex; align-items: center; gap: 12px; padding: 11px 18px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.12s; }
.task-row:last-child { border-bottom: none; }
.task-row:hover { background: var(--cream); }
.task-cb { width: 18px; height: 18px; border: 1px solid var(--border2); background: white; flex-shrink: 0; appearance: none; -webkit-appearance: none; position: relative; transition: all 0.18s; border-radius: 1px; cursor: pointer; }
.task-cb:checked { background: var(--ink); border-color: var(--ink); }
.task-cb:checked::after { content:''; position:absolute; left:4px; top:1px; width:8px; height:5px; border-left:1.5px solid white; border-bottom:1.5px solid white; transform:rotate(-45deg); }
.task-cb:disabled { background: var(--cream2); border-color: var(--border); cursor: default; }
.task-text { flex: 1; font-size: 13px; color: var(--ink2); line-height: 1.35; }
.task-text.done { color: var(--ink4); text-decoration: line-through; text-decoration-color: var(--border2); }
.task-text.na { color: var(--ink4); font-style: italic; }
.na-btn { font-size: 9px; letter-spacing: 0.08em; color: var(--ink3); border: 1px solid var(--border); padding: 2px 7px; cursor: pointer; background: none; font-family: 'Jost', sans-serif; transition: all 0.18s; flex-shrink: 0; }
.na-btn.on { color: #4CAF50; border-color: var(--amber-b); background: var(--amber-bg); }

/* ROOM FOOTER */
.room-footer { background: var(--cream); border-top: 1px solid var(--border); padding: 14px 18px; }
.foot-label { font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink3); margin-bottom: 6px; }
.room-notes { width: 100%; border: 1px solid var(--border); background: white; padding: 9px 11px; font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 300; color: var(--ink); resize: none; min-height: 56px; outline: none; border-radius: 1px; }
.room-notes:focus { border-color: var(--ink); }
.photo-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.photo-thumb { width: 62px; height: 62px; object-fit: cover; border: 1px solid var(--border); }
.photo-add { width: 62px; height: 62px; border: 1px dashed var(--border2); background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; gap: 2px; }
.photo-add span { font-size: 17px; color: var(--ink3); line-height: 1; }
.photo-add em { font-size: 8px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink3); font-style: normal; }

/* DAMAGE */
.damage-section { background: var(--red-bg); border: 1px solid var(--red-b); padding: 16px 18px; margin-bottom: 14px; }
.damage-label { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--red); margin-bottom: 8px; }
.damage-input { width: 100%; background: white; border: 1px solid var(--red-b); padding: 9px 11px; font-family: 'Jost', sans-serif; font-size: 13px; color: var(--ink); resize: none; min-height: 60px; outline: none; }

/* SUBMIT */
.submit-card { background: var(--ink); padding: 24px 22px; margin-top: 14px; }
.submit-stats { display: flex; gap: 2px; margin-bottom: 20px; }
.sub-stat { flex: 1; background: rgba(240,237,230,0.06); padding: 12px 8px; text-align: center; }
.sub-stat-n { font-family: 'Cormorant Garamond', serif; font-size: 26px; color: rgba(240,237,230,0.9); }
.sub-stat-l { font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(240,237,230,0.3); margin-top: 2px; }
.sig-label { font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(240,237,230,0.35); margin-bottom: 6px; }
.sig-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(240,237,230,0.18); padding: 6px 0; font-family: 'Cormorant Garamond', serif; font-size: 22px; font-style: italic; color: rgba(240,237,230,0.85); outline: none; margin-bottom: 18px; }
.sig-input::placeholder { color: rgba(240,237,230,0.18); }
.sig-input:focus { border-bottom-color: rgba(240,237,230,0.5); }
.submit-btn { width: 100%; padding: 15px; background: var(--cream); color: var(--ink); border: none; font-family: 'Jost', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
.submit-btn:hover { background: white; }
.submit-btn:disabled { opacity: 0.35; cursor: default; }
.success-msg { display: none; text-align: center; padding: 20px 0 4px; }
.success-msg div:first-child { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: rgba(240,237,230,0.9); margin-bottom: 4px; }
.success-msg div:last-child { font-size: 11px; color: rgba(240,237,230,0.35); }
</style>
</head>

</div>

<div class="content" id="mainContent"></div>

// ── STATE ──────────────────────────────────────────────────────
var state = {};
var photoCounts = {};
var totalPhotosByService = {};
SERVICES.forEach(function(s) {
  state[s.id] = { done: {}, na: {}, totalTasks: 0, doneTasks: 0 };
  photoCounts[s.id] = {};
  totalPhotosByService[s.id] = 0;
  s.sections.forEach(function(sec, si) {
    state[s.id].totalTasks += sec.tasks.length;
    photoCounts[s.id][si] = 0;
  });
});
var activeSvc = 'cleaning';

// ── BUILD UI ───────────────────────────────────────────────────
function buildTabs() {
  var tabs = document.getElementById('serviceTabs');
  SERVICES.forEach(function(s) {
    var t = document.createElement('div');
    t.className = 'svc-tab' + (s.id === activeSvc ? ' active' : '');
    t.id = 'tab-' + s.id;
    t.innerHTML = '<span class="svc-tab-icon">' + s.icon + '</span>' +
      '<span class="svc-tab-label">' + s.label + '</span>' +
      '<span class="svc-tab-badge">✓</span>';
    t.onclick = function() { switchService(s.id); };
    tabs.appendChild(t);
  });
}

function buildPanels() {
  var content = document.getElementById('mainContent');
  SERVICES.forEach(function(s) {
    var panel = document.createElement('div');
    panel.className = 'svc-panel' + (s.id === activeSvc ? ' active' : '');
    panel.id = 'panel-' + s.id;
    panel.innerHTML = buildPanelHTML(s);
    content.appendChild(panel);
  });
}

function buildPanelHTML(s) {
  var html = '';

  // Worker bar
  html += '<div class="worker-bar">' +
    '<span class="worker-label">Worker</span>' +
    '<input type="text" id="worker-' + s.id + '" placeholder="Your name" oninput="updateWorker(\'' + s.id + '\',this.value)">' +
    '</div>';

  // Service header
  html += '<div class="svc-header-card">' +
    '<span class="svc-header-icon">' + s.icon + '</span>' +
    '<div><div class="svc-header-title">' + s.title + '</div>' +
    '<div class="svc-header-sub">' + s.sub + '</div></div>' +
    '<div class="svc-header-badge" id="svc-badge-' + s.id + '">0 / ' + state[s.id].totalTasks + ' tasks</div>' +
    '</div>';

  // Progress
  html += '<div class="prog-wrap"><div class="prog-bar" id="prog-' + s.id + '" style="width:0"></div></div>' +
    '<div class="prog-label" id="prog-label-' + s.id + '">0 of ' + state[s.id].totalTasks + ' complete</div>';

  // Sections
  s.sections.forEach(function(sec, si) {
    var secId = s.id + '-' + si;
    html += '<div class="cl-section">';
    html += '<div class="cl-section-head open" id="sh-' + secId + '" onclick="toggleSec(\'' + secId + '\')">' +
      '<span class="cl-section-icon">' + sec.icon + '</span>' +
      '<span class="cl-section-name">' + sec.name + '</span>' +
      '<span class="cl-section-tally" id="st-' + secId + '">0 / ' + sec.tasks.length + '</span>' +
      '<span class="chevron">▾</span></div>';

    html += '<div class="cl-body open" id="cb-' + secId + '">';
    sec.tasks.forEach(function(task, ti) {
      var taskId = secId + '-' + ti;
      html += '<div class="task-row" onclick="toggleTask(\'' + taskId + '\',' + si + ',\'' + s.id + '\')">' +
        '<input type="checkbox" class="task-cb" id="cb-' + taskId + '" onchange="taskChange(\'' + taskId + '\',' + si + ',\'' + s.id + '\')">' +
        '<span class="task-text" id="tl-' + taskId + '">' + task + '</span>' +
        '<button class="na-btn" id="na-' + taskId + '" onclick="toggleNA(event,\'' + taskId + '\',' + si + ',\'' + s.id + '\')">N/A</button>' +
        '</div>';
    });

    // Section footer
    html += '<div class="room-footer">' +
      '<div class="foot-label">Notes</div>' +
      '<textarea class="room-notes" placeholder="Observations for this section…" id="notes-' + secId + '"></textarea>' +
      '<div class="foot-label" style="margin-top:10px;">Photos <small id="pc-' + secId + '" style="color:var(--ink4)">(0)</small></div>' +
      '<div class="photo-row" id="pg-' + secId + '">' +
      '<label class="photo-add"><span>+</span><em>Add</em><input type="file" accept="image/*" multiple capture="environment" style="display:none" onchange="addPhotos(this,\'' + secId + '\',\'' + s.id + '\')"></label>' +
      '</div></div>';

    html += '</div></div>';
  });

  // Damage section
  html += '<div class="damage-section" style="margin-top:14px;">' +
    '<div class="damage-label">⚠ Damage or issues</div>' +
    '<textarea class="damage-input" id="dmg-' + s.id + '" placeholder="Describe any damage, safety issues, or anything the client needs to know…"></textarea>' +
    '</div>';

  // Submit
  html += '<div class="submit-card">' +
    '<div class="submit-stats">' +
    '<div class="sub-stat"><div class="sub-stat-n" id="ss-done-' + s.id + '">0</div><div class="sub-stat-l">Done</div></div>' +
    '<div class="sub-stat"><div class="sub-stat-n" id="ss-photos-' + s.id + '">0</div><div class="sub-stat-l">Photos</div></div>' +
    '<div class="sub-stat"><div class="sub-stat-n" id="ss-pct-' + s.id + '">0%</div><div class="sub-stat-l">Complete</div></div>' +
    '</div>' +
    '<div class="sig-label">Signature</div>' +
    '<input class="sig-input" type="text" id="sig-' + s.id + '" placeholder="Sign your name">' +
    '<button class="submit-btn" id="sub-btn-' + s.id + '" onclick="submitReport(\'' + s.id + '\')">Submit report to Agape</button>' +
    '<div class="success-msg" id="sub-success-' + s.id + '">' +
    '<div>Report submitted.</div><div>Host and Agape have been notified.</div>' +
    '</div></div>';

  return html;
}

// ── INTERACTIONS ───────────────────────────────────────────────
function switchService(id) {
  document.querySelectorAll('.svc-panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.svc-tab').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('panel-' + id).classList.add('active');
  document.getElementById('tab-' + id).classList.add('active');
  activeSvc = id;
  document.getElementById('tab-' + id).scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  window.scrollTo(0, 0);
}

function toggleSec(secId) {
  var head = document.getElementById('sh-' + secId);
  var body = document.getElementById('cb-' + secId);
  head.classList.toggle('open');
  body.classList.toggle('open');
}

function toggleTask(taskId, si, svcId) {
  var cb = document.getElementById('cb-' + taskId);
  if (cb.disabled) return;
  cb.checked = !cb.checked;
  taskChange(taskId, si, svcId);
}

function taskChange(taskId, si, svcId) {
  var cb  = document.getElementById('cb-' + taskId);
  var lbl = document.getElementById('tl-' + taskId);
  lbl.classList.toggle('done', cb.checked);
  refreshProgress(svcId);
}

function toggleNA(e, taskId, si, svcId) {
  e.stopPropagation();
  var btn = document.getElementById('na-' + taskId);
  var cb  = document.getElementById('cb-' + taskId);
  var lbl = document.getElementById('tl-' + taskId);
  var on  = btn.classList.toggle('on');
  btn.textContent = on ? 'Undo' : 'N/A';
  cb.disabled = on; cb.checked = false;
  lbl.classList.toggle('na', on);
  lbl.classList.remove('done');
  refreshProgress(svcId);
}

function refreshProgress(svcId) {
  var svc = SERVICES.find(function(s){ return s.id === svcId; });
  var totalEff = 0, totalDone = 0;

  svc.sections.forEach(function(sec, si) {
    var secId = svcId + '-' + si;
    var cbs   = document.querySelectorAll('#cb-' + secId + ' .task-cb');
    var done  = 0, na = 0;
    cbs.forEach(function(cb) {
      if (cb.disabled) { na++; } else if (cb.checked) { done++; }
    });
    var eff = sec.tasks.length - na;
    totalEff  += eff;
    totalDone += done;

    var tally = document.getElementById('st-' + secId);
    tally.textContent  = done + ' / ' + eff;
    tally.className    = 'cl-section-tally' + (done === eff && eff > 0 ? ' done' : '');
  });

  var pct = totalEff > 0 ? Math.round(totalDone / totalEff * 100) : 0;
  document.getElementById('prog-' + svcId).style.width = pct + '%';
  document.getElementById('prog-label-' + svcId).textContent = totalDone + ' of ' + totalEff + ' complete';
  document.getElementById('svc-badge-' + svcId).textContent = totalDone + ' / ' + totalEff + ' tasks';
  document.getElementById('ss-done-' + svcId).textContent = totalDone;
  document.getElementById('ss-pct-' + svcId).textContent  = pct + '%';

  if (totalDone === totalEff && totalEff > 0) {
    document.getElementById('tab-' + svcId).classList.add('done');
  }
}

function addPhotos(input, secId, svcId) {
  var grid = document.getElementById('pg-' + secId);
  var btn  = grid.querySelector('label');
  Array.from(input.files).forEach(function(f) {
    var r = new FileReader();
    r.onload = function(e) {
      var img = document.createElement('img');
      img.src = e.target.result;
      img.className = 'photo-thumb';
      grid.insertBefore(img, btn);
      photoCounts[svcId][secId] = (photoCounts[svcId][secId] || 0) + 1;
      totalPhotosByService[svcId]++;
      document.getElementById('pc-' + secId).textContent = '(' + photoCounts[svcId][secId] + ')';
      document.getElementById('ss-photos-' + svcId).textContent = totalPhotosByService[svcId];
    };
    r.readAsDataURL(f);
  });
  input.value = '';
}

function updateWorker(svcId, val) {
  // Could sync to header worker name display
}

function submitReport(svcId) {
  var sig = document.getElementById('sig-' + svcId).value.trim();
  if (!sig) { alert('Please sign before submitting.'); return; }
  var btn = document.getElementById('sub-btn-' + svcId);
  btn.disabled = true;
  btn.textContent = 'Submitting…';
  setTimeout(function() {
    btn.style.display = 'none';
    document.getElementById('sub-success-' + svcId).style.display = 'block';
    document.getElementById('tab-' + svcId).classList.add('done');
  }, 1000);
}

function setCond(btn, cls) {
  btn.closest('.cond-row').querySelectorAll('button').forEach(function(b){ b.className = 'cond-btn'; });
  btn.classList.add(cls);
}

// ── INIT ───────────────────────────────────────────────────────
buildTabs();
buildPanels();

document.getElementById('headerDate').textContent =
  now.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });
