name: Deploy Firebase Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firebase.json'
      - '.firebaserc'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install function dependencies
        run: cd functions && npm install

      - name: Deploy functions
        run: firebase deploy --only functions --project agape-property-management
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Set runtime config
        run: |
          firebase functions:config:set \
            gmail.user="${{ secrets.GMAIL_USER }}" \
            gmail.pass="${{ secrets.GMAIL_PASS }}" \
            twilio.sid="${{ secrets.TWILIO_SID }}" \
            twilio.token="${{ secrets.TWILIO_TOKEN }}"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
